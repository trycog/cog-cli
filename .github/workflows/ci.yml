name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest       # x86_64 Linux
          - os: ubuntu-24.04-arm    # aarch64 Linux
          - os: macos-latest        # aarch64 macOS
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Download grammars
        run: zig build setup

      - name: Run tests
        run: zig build test
